name: Deploy API

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -m nltk.downloader stopwords vader_lexicon

      - name: Run tests
        run: pytest

      - name: Convert test report to PDF
        if: always()
        run: |
          google-chrome --headless --disable-gpu --print-to-pdf=test-report.pdf \
            --no-pdf-header-footer file://$(pwd)/test-report.html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.pdf

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - name: Delete stack if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name Ghostie-analytical-model --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack in ROLLBACK_COMPLETE — deleting..."
            aws cloudformation delete-stack --stack-name Ghostie-analytical-model
            aws cloudformation wait stack-delete-complete --stack-name Ghostie-analytical-model
          fi

      - name: Download NLTK data into package
        run: |
          pip install nltk
          python -m nltk.downloader -d nltk_data stopwords vader_lexicon

      - run: sam build

      - run: sam deploy --stack-name Ghostie-analytical-model --resolve-s3 --capabilities CAPABILITY_IAM --no-fail-on-empty-changeset

      - name: Invoke Lambda and show logs
        run: |
          FUNCTION=$(aws cloudformation describe-stack-resource \
            --stack-name Ghostie-analytical-model \
            --logical-resource-id MyFastApiFunction \
            --query 'StackResourceDetail.PhysicalResourceId' --output text)
          echo "Function: $FUNCTION"
          echo '{"httpMethod":"GET","path":"/health","headers":{},"queryStringParameters":null,"body":null,"isBase64Encoded":false}' > /tmp/payload.json
          aws lambda invoke --function-name "$FUNCTION" \
            --payload fileb:///tmp/payload.json \
            --log-type Tail --output text --query 'LogResult' /tmp/response.json | base64 -d
          echo "--- Response ---"
          cat /tmp/response.json