AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Resources:
  MyFastApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: main.handler # Points to the Mangum handler in main.py
      Runtime: python3.12
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          NLTK_DATA: /var/task/nltk_data
          LEARNED_LEXICON_PATH: /tmp/learned_lexicon.json
      Events:
        ApiCatchAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: Api
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: "Your Swagger UI Docs Page"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/docs"